<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dopemindz.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/yofukashino/Sparkles.js@main/sparkles.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <meta name="title" content="dopemindz | highest">
    <meta name="description" content="expectations meet exceptions">
    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://file.garden/aIRxY75TdDxAqDHm/fb4b3184b88a3c5acb7f0909114823b4.jpg">
    
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --text: #f8f8ff;
            --text-dim: #b0b0c5;
            --accent: #8b5cff;
            --accent-glow: rgba(139, 92, 255, 0.5);
            --glass: rgba(25, 25, 40, 0.45);
            --glass-border: rgba(200, 170, 255, 0.2);
            --radius-sm: 20px;
            --radius-lg: 32px;
            --transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --glow: 0 0 30px rgba(139, 92, 255, 0.6);
        }

        * { margin:0; padding:0; box-sizing:border-box; cursor:url(https://file.garden/aIRxY75TdDxAqDHm/11zon_image.cur) 16 16, auto !important; }

        html {
            scroll-behavior: smooth; 
        }

        body {
            background:#000;
            color:var(--text);
            font-family:'Exo 2', 'Poppins', sans-serif;
            min-height:100vh;
            overflow-x:hidden;
            line-height:1.6;
            -webkit-user-select: none; 
            -ms-user-select: none;     
            user-select: none;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position:fixed; inset:0;
            background: 
                radial-gradient(circle at 15% 25%, #1a0a33 0%, transparent 35%),
                radial-gradient(circle at 75% 65%, #0d1a4d 0%, transparent 45%),
                radial-gradient(circle at 35% 85%, #33001a 0%, transparent 40%);
            opacity:0.6; z-index:-3;
            animation: bgShift 20s ease infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.1) rotate(120deg); }
            66% { transform: scale(1.05) rotate(240deg); }
        }

        /* Grain Effect */
        .grain {
            position:fixed; inset:0;
            background-image: 
                radial-gradient(circle at 25% 25%, #fff 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, #fff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.08;
            pointer-events:none; 
            z-index:-2;
            animation: grainFloat 3s linear infinite;
        }

        @keyframes grainFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(1px, 1px); }
        }

        /* Glass Overlay */
        .glass-overlay {
            position:fixed; inset:0;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(25px);
            z-index:-1;
        }

        /* Navigation */
        nav {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            z-index:1000; background:var(--glass);
            backdrop-filter:blur(25px) saturate(180%);
            border:1px solid var(--glass-border); border-radius:999px;
            padding:12px 32px; 
            font-weight:600; letter-spacing:0.5px;
        }

        .dock { 
            display:flex; align-items:center; gap:36px; font-size:0.95rem; 
        }

        .dock a { 
            color:var(--text-dim); text-decoration:none; 
            transition:var(--transition); position:relative;
            padding:8px 16px;
        }

        .dock a::before {
            content:''; position:absolute; inset:0; background:var(--accent-glow);
            border-radius:50px; opacity:0; transition:var(--transition);
        }

        .dock a:hover::before, .dock a.active::before {
            opacity:1;
        }

        .dock a:hover, .dock a.active { 
            color:white; text-shadow:var(--glow); transform:translateY(-2px); 
        }

        /* Sections */
        section {
            min-height:100vh; padding:120px 24px 80px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            opacity:0; transform:translateY(60px);
            transition:all 1.2s cubic-bezier(0.34,1.56,0.64,1);
        }

        section.active {
            opacity:1; transform:translateY(0);
        }

        /* Hero */
        .hero {
            text-align:center; max-width:800px;
        }

        .hero-title {
            font-family:'Orbitron', monospace;
            font-weight:900;
            font-size: 100px;
            background:linear-gradient(135deg, #fff, var(--accent), #ff6b9d, #4ecdc4);
            background-size:400% 400%;
            -webkit-background-clip:text; background-clip:text;
            color:transparent; margin-bottom:2rem;
            animation: titlePulse 4s ease-in-out infinite;
            text-shadow:var(--glow);
        }

        @keyframes titlePulse {
            0%,100% { filter:brightness(1) hue-rotate(0deg); }
            50% { filter:brightness(1.3) hue-rotate(180deg); }
        }

        .hero-subtitle {
            font-size: 2rem;
            color:var(--text-dim);
            font-weight:300;
            letter-spacing:0px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-top: 10px;
        }

        /* Hall of Fame Grid */
        .hof-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:3rem; max-width:1400px; width:100%; padding:4rem 0;
        }

        .hof-card {
            padding:3rem 2.5rem; text-align:center; position:relative;
            overflow:hidden;
        }

        .hof-card::before { content:none; }
        .hof-card:hover { content: none; }

        .profile-display {
            position:relative; width:140px; height:140px; margin:0 auto 2rem;
            border-radius:50%; overflow:hidden; border:4px solid var(--glass-border);
        }

        .profile-avatar {
            width:100%; height:100%; object-fit:cover;
            transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }

        .hof-card:hover .profile-avatar {
            transform:scale(1.1) rotate(5deg);
        }

        .status-ring {
            position:absolute; bottom:12px; right:2px; width:12px; height:12px;
            border-radius:50%; border:4px solid var(--bg);
        }

        .status-ring.online { background:#3ba55c; box-shadow:0 0 20px #3ba55c; }
        .status-ring.idle { background:#faa61a; box-shadow:0 0 20px #faa61a; }
        .status-ring.dnd { background:#ed4245; box-shadow:0 0 20px #ed4245; }
        .status-ring.streaming { 
            background:var(--accent); box-shadow:0 0 20px var(--accent);
            position:relative;
        }

        .status-ring.streaming::after {
            content:''; position:absolute; inset:6px; background:#fff; border-radius:50%;
            animation:pulseRing 2s infinite;
        }

        @keyframes pulseRing {
            0%,100% { transform:scale(1); opacity:0.8; }
            50% { transform:scale(1.6); opacity:0.3; }
        }

        .profile-name { font-size:1.6rem; font-weight:700; margin-bottom:0.5rem; }
        .profile-stats { color:var(--text-dim); font-size:1rem; }

        /* Activity Wrapper (The Console Line Effect) */
        .activity-wrapper {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0;
            position: relative;
            padding: 0 12px;
        }

        .activity-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .hof-card:hover .activity-wrapper {
            max-height: 200px; 
            opacity: 1;
            margin-top: 1.5rem;
            padding: 12px;
        }

        .hof-card:hover .activity-wrapper::before {
            transform: scaleX(1);
        }

        .spotify-block {
            display: flex;
            gap: 12px;
            background: rgba(30, 30, 50, 0.4);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .game-block {
            color: var(--accent);
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* --- PANTHEON SLIDER CSS (PILL STYLE) --- */
        .pantheon-container {
            width: 100vw;
            overflow: hidden;
            position: relative;
            padding: 2rem 0;
            margin-top: 2rem;
        }

        .pantheon-track {
            display: flex;
            gap: 24px;
            width: max-content;
            animation: scrollPantheon 25s linear infinite;
        }

        .pantheon-track:hover {
            animation-play-state: paused;
        }

        @keyframes scrollPantheon {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 12px)); }
        }

        .pantheon-pill {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            background: rgba(25, 25, 40, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 999px; /* Pill Shape */
            padding: 12px 24px;
            min-width: 250px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .pantheon-pill:hover {
            background: rgba(40, 40, 60, 0.8);
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: var(--glow);
        }

        .pill-main {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .pill-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
        }

        .pill-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }

        .pill-activity {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            color: var(--accent);
        }

        .pantheon-pill:hover .pill-activity {
            max-height: 40px;
            opacity: 1;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--accent-glow);
            text-align: center;
        }

        /* Music Player */
        .music-player {
            position:fixed; bottom:24px; right:24px; width:90px; height:90px;backdrop-filter:blur(30px);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all var(--transition); z-index:1000;
        }

        .music-player:hover {
            transform:scale(1.15) rotate(360deg);
        }

        .music-player.playing { animation: none; }

        @media (max-width: 768px) {
            .dock { gap:24px; font-size:0.9rem; }
            .hof-grid { grid-template-columns:1fr; gap:2rem; }
            nav { padding:10px 20px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grain"></div>
    <div class="glass-overlay"></div>

    <nav>
        <div class="dock">
            <a href="#home" class="nav-link active"><i class="fas fa-crown"></i> Home</a>
            <a href="#hof" class="nav-link"><i class="fas fa-trophy"></i> Fame</a>
            <a href="#333" class="nav-link"><i class="fas fa-infinity"></i> 333</a>
            <a href="#void" class="nav-link"><i class='bx bx-images'></i> Affiliates</a>
        </div>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <h1 class="hero-title" style="font-family: serif">DOPEMNDS</h1>
            <p class="hero-subtitle" style="margin-top: 20px;">highest in the room.</p>
        </div>
    </section>

    <section id="hof">
        <div class="hof-grid" id="hallOfFame">
        </div>
    </section>

    <section id="333">
        <div style="text-align:center; max-width:900px;">
            <h2 style="font-family:serif; font-size:5rem; color:transparent; background:linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip:text; background-clip:text; margin-bottom:1rem;">
                333
            </h2>
        </div>
        
        <div class="pantheon-container">
            <div class="pantheon-track" id="pantheonTrack"></div>
        </div>
    </section>

    <section id="void">
        <div style="text-align:center; max-width:700px;">
            <h2 style="font-family:serif; font-size:4rem; color:#ff4757; margin-bottom:2rem;">
                wait te
            </h2>
        </div>
    </section>

    <div class="music-player" id="musicPlayer">
        <i class="fas fa-music music-icon" style="font-size:2.2rem; color:#fff;"></i>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://file.garden/aIRxY75TdDxAqDHm/Downtown%20Q%20-%20Panadero%202%20No%20Heart%20Remix%20feat.%20Hev%20Abi%20%26%20LK.mp3" type="audio/wav">
    </audio>

    <script>
        const HALL_OF_FAME_IDS = ['1480891607275274293', '737630884823433267', '1413874403837476956', '1015473740391399474', '453061371513536523', '1283033719371993111'];
        const PANTHEON_IDS = ['453061371513536523', '1015473740391399474', '1466518244335550586'];
        
        const API_BASE = 'https://api.lanyard.rest/v1/users/';

        // Navigation & Transitions
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = link.getAttribute('href').substring(1);
                const targetSection = document.getElementById(targetId);
                
                // Set the nav link to active instantly
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Smooth scroll directly to the section
                targetSection.scrollIntoView({ behavior: 'smooth' });
            });
        });

        // Lanyard Functions
        async function fetchUser(id) {
            try {
                const res = await fetch(API_BASE + id);
                const data = await res.json();
                return data.success ? data.data : null;
            } catch (err) {
                console.error("Error fetching Lanyard ID:", id, err);
                return null;
            }
        }

        function getAvatarUrl(user) {
            if (!user || !user.discord_user) return `https://cdn.discordapp.com/embed/avatars/0.png`;
            const { id, avatar } = user.discord_user;
            return avatar 
                ? `https://cdn.discordapp.com/avatars/${id}/${avatar}.webp?size=256`
                : `https://cdn.discordapp.com/embed/avatars/${parseInt(id) % 5}.png`;
        }

        function getStatusClass(status) {
            if (status === 'online') return 'online';
            if (status === 'idle') return 'idle';
            if (status === 'dnd') return 'dnd';
            return 'offline';
        }

        function renderActivity(user) {
            let innerContent = '';

            if (user.listening_to_spotify && user.spotify) {
                innerContent = `
                    <div class="spotify-block">
                        <img src="${user.spotify.album_art_url}" style="width:42px;height:42px;border-radius:6px;flex-shrink:0;" alt="Spotify">
                        <div style="overflow:hidden;">
                            <div style="font-weight:600;color:#1ed760;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${user.spotify.song}</div>
                            <div style="color:var(--text-dim);font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${user.spotify.artist}</div>
                        </div>
                    </div>`;
            } else {
                const game = user.activities?.find(a => a.type === 0);
                if (game) {
                    innerContent = `<div class="game-block" style="font-family: serif;"> <i class="fas fa-terminal" style="font-size:0.7rem;"></i> Now Playing: ${game.name}</div>`;
                } else {
                    innerContent = `<div style="color:var(--text-dim);font-size:0.8rem;font-style:italic;">No Activity</div>`;
                }
            }

            return `<div class="activity-wrapper">${innerContent}</div>`;
        }

        // Load HOF
        async function loadHallOfFame() {
            const container = document.getElementById('hallOfFame');
            container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-dim);"><i class="fas fa-spinner fa-spin"></i> Fetching users...</div>`;

            const users = await Promise.all(HALL_OF_FAME_IDS.map(id => fetchUser(id)));
            const validUsers = users.filter(u => u !== null);

            if (validUsers.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1;text-align:center;">No fetched users</div>`;
                return;
            }

            container.innerHTML = validUsers.map((user, index) => {
                const u = user.discord_user;
                const status = getStatusClass(user.discord_status);
                const name = u.global_name || u.username;

                return `
                    <div class="hof-card">
                        <div class="profile-display">
                            <img src="${getAvatarUrl(user)}" class="profile-avatar" alt="${name}">
                            <div class="status-ring ${status}"></div>
                        </div>
                        <div class="profile-name">${name}</div>
                        <div class="profile-stats">@${u.username}</div>
                        ${renderActivity(user)}
                    </div>
                `;
            }).join('');
        }

        // Load Pantheon (Pill Slider Logic)
        async function loadPantheon() {
            const track = document.getElementById('pantheonTrack');
            const users = await Promise.all(PANTHEON_IDS.map(id => fetchUser(id)));
            const validUsers = users.filter(u => u !== null);

            const cards = validUsers.map(user => {
                const name = user.discord_user.global_name || user.discord_user.username;
                let activityText = "No Activity";
                if (user.listening_to_spotify) activityText = `♫ ${user.spotify.song}`;
                else if (user.activities?.find(a => a.type === 0)) activityText = `⬡ ${user.activities.find(a => a.type === 0).name}`;

                return `
                    <div class="pantheon-pill">
                        <div class="pill-main">
                            <img src="${getAvatarUrl(user)}" class="pill-avatar" alt="${name}">
                            <div class="pill-name">${name}</div>
                        </div>
                        <div class="pill-activity" style="font-family:serif;">${activityText}</div>
                    </div>
                `;
            }).join('');

            track.innerHTML = cards + cards;
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadHallOfFame();
            loadPantheon(); 
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // Update active nav based on scroll position
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        document.querySelectorAll('.nav-link').forEach(link => {
                            if (link.getAttribute('href').substring(1) === entry.target.id) {
                                link.classList.add('active');
                            } else {
                                link.classList.remove('active');
                            }
                        });
                    }
                });
            }, { threshold: 0.5 }); // Added threshold so it updates when mostly in view

            document.querySelectorAll('section').forEach(section => observer.observe(section));
        });

        // Music Logic
        const musicPlayer = document.getElementById('musicPlayer');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        musicPlayer.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicPlayer.innerHTML = '<i class="fas fa-music" style="font-size:2.2rem;color:#fff;"></i>';
            } else {
                bgMusic.play().catch(e => console.log("Audio play blocked"));
                musicPlayer.innerHTML = '<i class="fas fa-pause" style="font-size:2.2rem;color:#fff;"></i>';
            }
            isPlaying = !isPlaying;
            musicPlayer.classList.toggle('playing', isPlaying);
        });
    </script>
</body>
</html>
